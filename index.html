<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coin — 암호화폐 대시보드</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="top">
    <div class="brand">🪙 <b>Coin</b><span>실시간 시세</span></div>
    <div class="right">
      <span class="live">● 실시간</span>
      <div class="krw-wallet">보유 현금: <b id="userCash">10,000,000</b> 원</div>
      <button class="wallet">💼 내 지갑</button>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <div>
        <p class="kicker">내 포트폴리오 가치</p>
        <h1 id="portfolio">₩ 0</h1>
        <p id="change" class="change up">▲ 0 (0%)</p>
      </div>
      <div class="chips">
        <div class="chip"><b>BTC</b><span>32%</span></div>
        <div class="chip"><b>ETH</b><span>28%</span></div>
        <div class="chip"><b>SOL</b><span>18%</span></div>
        <div class="chip"><b>기타</b><span>22%</span></div>
      </div>
    </section>

    <section class="row">
      <div class="panel" style="min-height: 280px;">
        <header>
          <h3 id="chartCoin">BTC / KRW</h3>
        </header>
        <canvas id="priceChart" height="200"></canvas>
      </div>
    </section>

    <section class="row two">
      <div class="panel">
        <header><h3>인기 코인</h3></header>
        <ul class="coin-list" id="coinList"></ul>
      </div>

      <div class="right-col">
        <div class="panel order-panel sticky-order-panel">
          <header><h3>⚡ <span id="orderCoinName">비트코인</span> 주문하기</h3></header>
          <div class="order-box">
            <div class="order-info">
              <div>현재가: <span class="order-price" id="orderPrice">₩ 0</span></div>
              <div>보유량: <span id="orderMyAmount">0</span> <span id="orderCoinSym">BTC</span></div>
            </div>
            <div class="input-group">
              <input type="number" id="tradeAmount" step="0.001" min="0" placeholder="거래 수량 입력">
              <span class="unit" id="inputUnit">BTC</span>
            </div>
            <div class="trade-buttons">
              <button id="btnBuy" class="t-trade-btn buy-btn" style="background:#16c784; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; flex:1; margin-right:5px;">즉시 구매</button>
              <button id="btnSell" class="t-trade-btn sell-btn" style="background:#ea3943; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; flex:1;">즉시 판매</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="row">
      <div class="panel full">
        <header><h3>📊 보유 자산</h3></header>
        <table class="holdings">
          <thead><tr><th>자산</th><th>보유량</th><th>평균 매수가</th><th>현재가</th><th>평가 손익</th><th>수익률</th></tr></thead>
          <tbody>
            <tr id="row-BTC"></tr>
            <tr id="row-ETH"></tr>
            <tr id="row-SOL"></tr>
            <tr id="row-BNB"></tr>
            <tr id="row-XRP"></tr>
            <tr id="row-ADA"></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
