<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER COIN SIMULATOR v1.1</title>
  <!-- CSS 스타일시트 연결 -->
  <link rel="stylesheet" href="style.css">
  <!-- 실시간 라인 차트 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 최상단 네비게이션 바 -->
  <nav class="top">
    <div class="brand">🚀 CYBER COIN EXCHANGE <span>Simulation v1.1</span></div>
    <div class="right">
      <div class="live">LIVE FEED CONNECTED</div>
      <div class="krw-wallet">가용 투자 현금: <b id="userCash">10,000,000</b> KRW</div>
    </div>
  </nav>

  <!-- 메인 대시보드 구조 -->
  <main class="main">
    
    <!-- 종합 계좌 정보 카드 -->
    <section class="hero">
      <div>
        <p class="kicker">총 평가 자산 (예수금 + 코인 평가금)</p>
        <h1 id="portfolio">₩ 10,000,000</h1>
        <div id="change" class="change up">▲ ₩ 0 (0.00%)</div>
      </div>
      <div>
        <div class="chip">총 투자 원금: <span id="initAssetDisplay" style="color:#fff; font-weight:bold;">₩ 0</span></div>
      </div>
    </section>

    <!-- 2단 반응형 그리드 -->
    <div class="row two">
      
      <!-- 왼쪽 컬럼: 차트 및 자산 테이블 -->
      <div class="left-col">
        <!-- 실시간 시세 그래프 -->
        <article class="panel">
          <header>
            <h2 id="chartCoin">BTC / KRW</h2>
            <span style="color: var(--muted); font-size: 12px;">3초 주기 실시간 리프레시</span>
          </header>
          <div class="chart-container">
            <canvas id="priceChart"></canvas>
          </div>
        </article>

        <!-- 보유 자산 상태판 -->
        <article class="panel">
          <header>
            <h2>보유 자산 실시간 현황</h2>
          </header>
          <div class="table-wrapper">
            <table class="holdings">
              <thead>
                <tr>
                  <th>자산명</th>
                  <th>보유수량</th>
                  <th>매수평균가</th>
                  <th>현재가</th>
                  <th>평가손익</th>
                  <th>수익률</th>
                </tr>
              </thead>
              <tbody id="holdingsBody">
                <!-- 자바스크립트 동적 생성 영역 -->
              </tbody>
            </table>
          </div>
        </article>
      </div>

      <!-- 오른쪽 컬럼: 마켓 시세판 및 고정 주문창 -->
      <div class="right-col">
        <!-- 마켓 종목 리스트 -->
        <article class="panel">
          <header>
            <h2>실시간 마켓 시세</h2>
          </header>
          <ul class="coin-list" id="coinList">
            <!-- 코인 종목 동적 생성 영역 -->
          </ul>
        </article>

        <!-- 네온 옐로우 스티키 주문 패널 -->
        <article class="panel sticky-order-panel">
          <header>
            <h2><span id="orderCoinName">비트코인</span> 원화 주문</h2>
          </header>
          <div class="order-box">
            <div class="order-info">
              <div><span>주문 예정 코인</span> <span class="order-price" id="orderCoinSym">BTC</span></div>
              <div><span>주문 현재 시세</span> <span class="order-price" id="orderPrice">₩ 0</span></div>
              <div><span>내가 가진 수량</span> <span class="order-price" id="orderMyAmount">0.0000</span></div>
            </div>

            <div class="input-group">
              <input type="number" id="tradeAmount" placeholder="주문할 수량 입력" step="0.0001" min="0">
              <span class="unit" id="inputUnit">BTC</span>
            </div>

            <div class="trade-buttons">
              <button id="btnBuy" class="t-trade-btn">지정가 매수</button>
              <button id="btnSell" class="t-trade-btn">지정가 매도</button>
            </div>
          </div>
        </article>
      </div>

    </div>
  </main>

  <!-- 자바스크립트 비즈니스 로직 연결 -->
  <script src="script.js"></script>
</body>
</html>
